databases:
  - name: movie_theater_bookingdatabase
    plan: free
    databaseName: movie_theater_booking
    user: movie_theater_booking

services:
  - type: web
    name: movie-theater-booking
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn movie_theater_booking.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4